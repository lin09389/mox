services:
  # Mox API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mox-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MOX_HOST=0.0.0.0
      - MOX_PORT=8000
      - MOX_DEBUG=false
      - MOX_DATA_DIR=/data
      - MOX_DATABASE_URL=sqlite+aiosqlite:///data/mox.db
      - MOX_REDIS_URL=redis://redis:6379
      - MOX_REDIS_ENABLED=true
    volumes:
      - mox-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - mox-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mox-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mox-network

  # Mox Web UI (Gradio - 已弃用，仅调试时启用: docker compose --profile gradio up ui)
  ui:
    profiles:
      - gradio
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mox-ui
    command: ["python", "-m", "mox", "ui"]
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - MOX_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mox-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - mox-network

  # Prometheus Metrics (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: mox-prometheus
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - mox-network

  # Grafana Dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: mox-grafana
    profiles:
      - monitoring
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in your .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - mox-network

volumes:
  mox-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  mox-network:
    driver: bridge
