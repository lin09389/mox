[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
show_error_codes = True
no_implicit_optional = False

[mypy-tests.*]
ignore_errors = True

# Legacy/experimental modules with known typing debt.
[mypy-mox.core.chinese_llm]
ignore_errors = True

[mypy-mox.core.cicd]
ignore_errors = True

[mypy-mox.routes.api_v2]
ignore_errors = True

[mypy-mox.core.llm_gateway]
ignore_errors = True

[mypy-mox.*]
ignore_errors = True
