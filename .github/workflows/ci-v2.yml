name: CI/CD with Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每天凌晨 2 点运行安全回归测试
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_security_tests:
        description: 'Run security regression tests'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============ 代码质量检查 ============
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff black mypy

      - name: Run ruff
        run: ruff check mox/ --output-format=github

      - name: Run black check
        run: black --check mox/

      - name: Run mypy
        run: mypy mox/ --ignore-missing-imports

  # ============ 安全扫描 ============
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run bandit
        run: |
          bandit -r mox/ -x tests/ -f json -o bandit-report.json || true
          bandit -r mox/ -x tests/ -f txt

      - name: Run safety check
        run: safety check --json > safety-report.json || true

      - name: Run pip-audit
        run: pip-audit || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 7

  # ============ 单元测试 ============
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [lint, security]
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=mox \
            --cov-report=xml \
            --cov-report=html \
            --timeout=120

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

  # ============ 安全回归测试 ============
  security-regression:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'schedule' || github.event.inputs.run_security_tests == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run attack module tests
        run: |
          pytest tests/ -v \
            -k "attack" \
            --tb=short \
            --timeout=300
        env:
          MOX_TEST_MODE: "true"

      - name: Run defense module tests
        run: |
          pytest tests/ -v \
            -k "defense" \
            --tb=short \
            --timeout=300

      - name: Run benchmark tests
        run: |
          pytest tests/ -v \
            -k "benchmark" \
            --tb=short \
            --timeout=300

      - name: Generate security test report
        run: |
          python -c "
          import json
          from datetime import datetime
          report = {
              'timestamp': datetime.now().isoformat(),
              'status': 'completed',
              'tests_run': 'security_regression'
          }
          with open('security-test-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          "

      - name: Upload security test report
        uses: actions/upload-artifact@v4
        with:
          name: security-test-report
          path: security-test-report.json
          retention-days: 30

  # ============ 集成测试 ============
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/ -v \
            -k "integration" \
            --tb=short \
            --timeout=300
        env:
          MOX_REDIS_URL: redis://localhost:6379
          MOX_REDIS_ENABLED: "true"

  # ============ API 测试 ============
  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start API server
        run: |
          python -m mox api &
          sleep 10
        env:
          MOX_HOST: 0.0.0.0
          MOX_PORT: 8000
          MOX_DEBUG: "true"

      - name: Run API tests
        run: |
          pytest tests/ -v \
            -k "api" \
            --tb=short \
            --timeout=120

      - name: Test health endpoint
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:8000/api/health || exit 1

      - name: Test OpenAPI docs
        run: |
          curl -f http://localhost:8000/docs || exit 1

  # ============ Docker 构建 ============
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: moxai/mox
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ 部署 ============
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build, security-regression]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://mox.example.com
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/mox
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f || true

      - name: Health check
        run: |
          sleep 30
          curl -f https://mox.example.com/health || exit 1

  # ============ 通知 ============
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, security, test, security-regression]
    if: failure()
    steps:
      - name: Send notification
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          fields: repo,message,commit,author,action
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}